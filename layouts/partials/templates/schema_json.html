{{- if not .IsHome -}}
{{- $breadcrumbLen := len .Ancestors -}}
{{- if gt $breadcrumbLen 0 -}}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [{{ range $i, $p := .Ancestors.Reverse }}
    {
      "@type": "ListItem",
      "position": {{ add $i 1 }},
      "name": {{ $p.Title }},
      "item": "{{ $p.Permalink }}"
    }{{ if lt (add $i 1) $breadcrumbLen }},{{ end }}{{ end }}
  ]
}
</script>
{{- end }}
{{- end -}}

{{ if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "WebSite",
  "name": {{ site.Title }},
  "url": {{ site.Home.Permalink }},
  "description": {{ .Description | default site.Language.Params.description | plainify | truncate 180 | safeHTML }},
  "inLanguage": "{{ site.Language.Lang }}",
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title }}
  }
}
</script>
{{- else if .IsPage }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "MedicalWebPage",
  "headline": {{ .Title | plainify }},
  "name": "{{ .Title | plainify }}",
  "description": {{ with .Description | plainify }}{{ . }}{{ else }}{{ .Summary | plainify }}{{ end }},
  "keywords": [
    {{- if .Params.keywords }}
    {{ range $i, $e := .Params.keywords }}{{ if $i }}, {{ end }}{{ $e }}{{ end }}
    {{- else }}
    {{ range $i, $e := .Params.tags }}{{ if $i }}, {{ end }}{{ $e }}{{ end }}
    {{- end }}
  ],
  "articleBody": {{ .Content | safeJS | htmlUnescape | plainify | truncate 5000 }},
  "wordCount" : "{{ .WordCount }}",
  "inLanguage": "{{ site.Language.Lang }}",
  {{ if .Params.cover.image -}}
  "image": {{- if (ne .Params.cover.relative true) -}}{{ .Params.cover.image | absURL }}{{- else -}}{{ (path.Join .RelPermalink .Params.cover.image ) | absURL }}{{- end}},
  {{- else }}
    {{- $images := partial "templates/_funcs/get-page-images" . -}}
    {{- with index $images 0 -}}
  "image": {{ .Permalink }},
    {{- end }}
  {{- end -}}
  "datePublished": {{ .PublishDate }},
  "dateModified": {{ .Lastmod }},
  "author": {
    "@type": "Person",
    "name": {{ .Params.author | default site.Params.author | default site.Title }}
  },
  "mainEntityOfPage": {
    "@type": "WebPage",
    "@id": {{ .Permalink | safeHTML }}
  },
  "publisher": {
    "@type": "Organization",
    "name": {{ site.Title }}
  },
  "about": {
    "@type": "Thing",
    "name": "{{ if eq site.Language.Lang "en" }}Aesthetic Medicine{{ else }}整形美容{{ end }}",
    "description": "{{ if eq site.Language.Lang "en" }}Aesthetic Medicine Knowledge Popularization{{ else }}整形美容知识科普{{ end }}"
  },
  "medicalAudience": "{{ if eq site.Language.Lang "en" }}Patient{{ else }}患者{{ end }}",
  "relevantSpecialty": "{{ if eq site.Language.Lang "en" }}Plastic Surgery{{ else }}整形外科{{ end }}"
}
</script>
{{- end -}}
